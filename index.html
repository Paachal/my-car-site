<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top 5 Performance Cars · 3D Showcase</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #08080C;
  --surface: #10101A;
  --surface2: #18182A;
  --text: #E8E8F2;
  --muted: #5A5A7A;
  --red: #E8192C;
  --blue: #2D8CFF;
  --orange: #E87A19;
  --gold: #C9A84C;
}

html, body {
  width:100%; height:100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', 'Arial Narrow', sans-serif;
  overflow: hidden;
}

/* ─── LOADING SCREEN ─── */
#loader {
  position:fixed; inset:0; z-index:100;
  background: var(--bg);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:20px;
  transition: opacity 0.6s;
}
#loader.hidden { opacity:0; pointer-events:none; }

.loader-ring {
  width:60px; height:60px;
  border:2px solid rgba(255,255,255,0.08);
  border-top-color: var(--red);
  border-radius:50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

.loader-label {
  font-size:11px; letter-spacing:4px;
  text-transform:uppercase; color:var(--muted);
}

/* ─── LAYOUT ─── */
#app {
  display:grid;
  grid-template-rows: 70px 1fr 140px;
  grid-template-columns: 1fr;
  height:100vh;
  opacity:0;
  transition: opacity 0.8s 0.3s;
}
#app.visible { opacity:1; }

/* ─── TOP NAV ─── */
#topbar {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:0 40px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:relative; z-index:10;
}

.logo {
  font-size:13px; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  color: var(--text);
}
.logo span { color:var(--red); }

.nav-counter {
  font-size:12px; color:var(--muted);
  letter-spacing:2px;
  font-variant-numeric: tabular-nums;
}

.budget-badge {
  font-size:11px; letter-spacing:2px;
  text-transform:uppercase;
  color: var(--gold);
  border:1px solid rgba(201,168,76,0.3);
  padding:5px 12px; border-radius:20px;
}

/* ─── 3D CANVAS AREA ─── */
#canvas-wrap {
  position:relative;
  overflow:hidden;
}

#three-canvas {
  width:100%; height:100%;
  display:block;
}

/* Car name overlay */
#car-overlay {
  position:absolute;
  top:0; left:0; bottom:0;
  width:380px;
  padding:36px 40px;
  display:flex; flex-direction:column;
  justify-content:center;
  pointer-events:none;
  background: linear-gradient(90deg, rgba(8,8,12,0.92) 0%, rgba(8,8,12,0.6) 60%, transparent 100%);
}

.rank-num {
  font-size:80px; font-weight:900;
  line-height:1;
  color: var(--accent, var(--red));
  opacity:0.15;
  margin-bottom:-10px;
  transition: color 0.4s;
  font-style:italic;
}

.car-make {
  font-size:13px; letter-spacing:4px;
  text-transform:uppercase;
  color: var(--muted);
  margin-bottom:4px;
}

.car-model-name {
  font-size:52px; font-weight:900;
  line-height:0.95; text-transform:uppercase;
  letter-spacing:-1px;
  color: var(--text);
  transition: color 0.3s;
}
.car-model-name .accent { color:var(--accent, var(--red)); transition:color 0.4s; }

.car-years {
  font-size:13px; color:var(--muted);
  letter-spacing:2px; margin-top:8px;
}

/* stat bars */
.stat-bars {
  margin-top:28px;
  display:flex; flex-direction:column; gap:10px;
}
.stat-row { display:flex; flex-direction:column; gap:4px; }
.stat-meta { display:flex; justify-content:space-between; font-size:11px; }
.stat-name { color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.stat-value { color:var(--text); font-weight:600; }
.stat-track {
  height:3px; background:rgba(255,255,255,0.07); border-radius:2px; overflow:hidden;
}
.stat-fill {
  height:100%; border-radius:2px;
  background: var(--accent, var(--red));
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1), background 0.4s;
  width:0;
}

/* price */
.price-display {
  margin-top:24px;
  display:flex; align-items:baseline; gap:8px;
}
.price-label { font-size:11px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; }
.price-amount {
  font-size:22px; font-weight:800;
  color:var(--accent, var(--red));
  letter-spacing:1px;
  transition:color 0.4s;
}

/* drag hint */
#drag-hint {
  position:absolute;
  bottom:24px; right:40px;
  display:flex; align-items:center; gap:8px;
  font-size:11px; color:var(--muted);
  letter-spacing:2px; text-transform:uppercase;
  opacity:1; transition:opacity 0.5s;
}
#drag-hint.hidden { opacity:0; pointer-events:none; }
.drag-icon { font-size:18px; animation:wiggle 1.5s ease-in-out infinite; }
@keyframes wiggle {
  0%,100% { transform:rotate(-15deg); }
  50% { transform:rotate(15deg); }
}

/* ─── BOTTOM CAR SELECTOR ─── */
#car-selector {
  border-top:1px solid rgba(255,255,255,0.05);
  display:flex; align-items:stretch;
  overflow-x:auto; scrollbar-width:none;
}
#car-selector::-webkit-scrollbar { display:none; }

.car-thumb {
  flex:1; min-width:140px;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  gap:6px;
  padding:16px 12px;
  cursor:pointer;
  position:relative;
  border-right:1px solid rgba(255,255,255,0.04);
  transition: background 0.3s;
  user-select:none;
}
.car-thumb:last-child { border-right:none; }
.car-thumb:hover { background:rgba(255,255,255,0.03); }
.car-thumb.active { background:rgba(255,255,255,0.05); }

.car-thumb::after {
  content:'';
  position:absolute; top:0; left:0; right:0;
  height:2px;
  background:var(--t-accent, transparent);
  transition: background 0.3s;
}
.car-thumb.active::after { background:var(--t-accent); }

.thumb-rank {
  font-size:10px; font-weight:700;
  letter-spacing:3px;
  color:var(--t-accent);
}
.thumb-name {
  font-size:13px; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  text-align:center; line-height:1.2;
  color:var(--text);
}
.thumb-hp {
  font-size:11px; color:var(--muted);
  letter-spacing:1px;
}

/* ─── AMBIENT PARTICLES ─── */
.particles {
  position:absolute; inset:0;
  pointer-events:none; overflow:hidden;
}
.particle {
  position:absolute;
  width:2px; height:2px;
  border-radius:50%;
  background:rgba(255,255,255,0.3);
  animation: float linear infinite;
}
@keyframes float {
  from { transform:translateY(100vh) translateX(0); opacity:0; }
  10% { opacity:1; }
  90% { opacity:0.5; }
  to { transform:translateY(-10vh) translateX(40px); opacity:0; }
}

/* ─── TRANSITION FLASH ─── */
#transition-overlay {
  position:absolute; inset:0;
  background:var(--bg);
  opacity:0; pointer-events:none;
  transition:opacity 0.15s;
  z-index:5;
}
#transition-overlay.flash { opacity:0.8; }

@media (max-width:700px) {
  #car-overlay { width:100%; padding:20px; background:linear-gradient(180deg,rgba(8,8,12,0.95) 0%, rgba(8,8,12,0.7) 70%, transparent 100%); top:auto; bottom:0; left:0; right:0; height:auto; }
  .rank-num { font-size:50px; }
  .car-model-name { font-size:34px; }
  .stat-bars { display:none; }
  #topbar { padding:0 20px; }
  .budget-badge { display:none; }
}
</style>

<!-- THREE.JS via ESM -->
<script type="importmap">
{
  "imports": {

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

// ─── CAR DATA ───
const CARS = [
  {
    rank:5, make:'Honda', model:'Civic', suffix:'Si',
    years:'2006 – 2011', power:197, powerMax:650,
    engine:'K20Z3 · 2.0L I4', enginePct:45,
    value:8.5, price:'₦7M – ₦10M',
    accent:'#E8192C', accentRgb:'232,25,44',
    bodyColor:0x111111, rimColor:0x1a1a1a,
    glb: './civic.glb',
  },
  {
    rank:4, make:'Toyota', model:'Corolla', suffix:'2020',
    years:'2019 – 2022', power:169, powerMax:650,
    engine:'M20A-FKS · 2.0L I4', enginePct:40,
    value:8.8, price:'₦8M – ₦12M',
    accent:'#2D8CFF', accentRgb:'45,140,255',
    bodyColor:0x050a1a, rimColor:0x101828,
    glb: './corolla.glb',
  },
  {
    rank:3, make:'Toyota', model:'Camry', suffix:'V6',
    years:'2007 – 2011', power:268, powerMax:650,
    engine:'2GR-FE · 3.5L V6', enginePct:75,
    value:9.0, price:'₦6M – ₦9M',
    accent:'#E87A19', accentRgb:'232,122,25',
    bodyColor:0x0d0805, rimColor:0x1a1200,
    glb: './camry.glb',
  },
  {
    rank:2, make:'Honda', model:'Accord', suffix:'V6',
    years:'2008 – 2012', power:271, powerMax:650,
    engine:'J35 · 3.5L V6', enginePct:78,
    value:9.3, price:'₦6M – ₦10M',
    accent:'#E8192C', accentRgb:'232,25,44',
    bodyColor:0x180008, rimColor:0x200010,
    glb: './accord.glb',
  },
  {
    rank:1, make:'Mercedes-Benz', model:'Maybach', suffix:'S680',
    years:'2021 – 2023', power:621, powerMax:650,
    engine:'M279 · 6.0L V12 Biturbo', enginePct:98,
    value:9.9, price:'₦350M – ₦500M',
    accent:'#C9A84C', accentRgb:'201,168,76',
    bodyColor:0x080806, rimColor:0x2a2410,
    glb: './maybach.glb',
  }
];

// ─── SCENE SETUP ───
const canvas = document.getElementById('three-canvas');
const wrap = document.getElementById('canvas-wrap');

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.85;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08080C);
scene.fog = new THREE.FogExp2(0x08080C, 0.04);

const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.set(4.5, 1.8, 6);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 3;
controls.maxDistance = 12;
controls.maxPolarAngle = Math.PI / 2 + 0.1;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.8;

// ─── LIGHTING ───
const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambientLight);

// Key light (front)
const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(5, 8, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048,2048);
keyLight.shadow.camera.near = 0.1;
keyLight.shadow.camera.far = 30;
keyLight.shadow.camera.left = -8;
keyLight.shadow.camera.right = 8;
keyLight.shadow.camera.top = 8;
keyLight.shadow.camera.bottom = -8;
scene.add(keyLight);

// Rim light (back)
const rimLight = new THREE.DirectionalLight(0x4488ff, 1.2);
rimLight.position.set(-5, 4, -5);
scene.add(rimLight);

// Ground bounce
const fillLight = new THREE.DirectionalLight(0xffffff, 0.5);
fillLight.position.set(0, -3, 3);
scene.add(fillLight);

// Accent spotlight (colored, per car)
const accentSpot = new THREE.SpotLight(0xe8192c, 3, 15, Math.PI/6, 0.5, 1);
accentSpot.position.set(-3, 5, 0);
scene.add(accentSpot);
scene.add(accentSpot.target);
accentSpot.target.position.set(0, 0, 0);

// ─── FLOOR ───
const floorGeo = new THREE.PlaneGeometry(30, 30);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x0a0a10,
  roughness: 0.4,
  metalness: 0.6,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.position.y = -0.001;
floor.receiveShadow = true;
scene.add(floor);

// Floor reflection circle
const circleGeo = new THREE.CircleGeometry(4, 64);
const circleMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d18, roughness:0.1, metalness:0.9
});
const circle = new THREE.Mesh(circleGeo, circleMat);
circle.rotation.x = -Math.PI/2;
circle.position.y = 0.001;
circle.receiveShadow = true;
scene.add(circle);

// Accent ring
const ringGeo = new THREE.RingGeometry(3.9, 4.1, 64);
const ringMat = new THREE.MeshBasicMaterial({ color:0xe8192c, side:THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.002;
scene.add(ring);

// ─── GRID LINES ───
const gridHelper = new THREE.GridHelper(30, 30, 0x111120, 0x111120);
gridHelper.position.y = 0.003;
scene.add(gridHelper);

// ─── LOAD MODEL ───
const loader = new GLTFLoader();
let carGroup = null;

function loadCarModel(car) {
  return new Promise((resolve) => {
    loader.load(car.glb, (gltf) => {
      const model = gltf.scene;

      // Auto-fit: center and scale
      const box = new THREE.Box3().setFromObject(model);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 3.5 / maxDim;

      model.scale.setScalar(scale);
      model.position.sub(center.multiplyScalar(scale));

      // Lift to floor
      const box2 = new THREE.Box3().setFromObject(model);
      model.position.y -= box2.min.y;

      // Apply car's body color to main mesh
      model.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            // Tint body panels
            if (child.name && (child.name.toLowerCase().includes('body') ||
                child.name.toLowerCase().includes('car') ||
                child.name.toLowerCase().includes('chassis'))) {
              child.material = child.material.clone();
              child.material.color.setHex(car.bodyColor);
            }
          }
        }
      });

      resolve(model);
    }, undefined, (err) => {
      // Fallback: procedural car shape
      console.warn('GLB load failed, using fallback', err);
      const g = buildFallbackCar(car);
      resolve(g);
    });
  });
}

// ─── PROCEDURAL FALLBACK CAR ───
function buildFallbackCar(car) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({
    color: car.bodyColor, roughness:0.15, metalness:0.9
  });
  const glassMat = new THREE.MeshStandardMaterial({
    color:0x112233, roughness:0.05, metalness:0.1, transparent:true, opacity:0.7
  });
  const rimMat = new THREE.MeshStandardMaterial({
    color: car.rimColor === 0 ? 0x1a1a1a : car.rimColor, roughness:0.2, metalness:0.95
  });
  const tireMat = new THREE.MeshStandardMaterial({ color:0x080808, roughness:0.9 });
  const lightMat = new THREE.MeshStandardMaterial({
    color:0xffeedd, emissive:0xffeedd, emissiveIntensity:0.8
  });
  const accentMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(car.accent),
    emissive: new THREE.Color(car.accent),
    emissiveIntensity:0.3,
    roughness:0.3, metalness:0.8
  });

  // Main body lower — Maybach gets longer wheelbase
  const bodyLength = car.suffix === 'S680' ? 5.2 : 4;
  const bodyLow = new THREE.Mesh(new THREE.BoxGeometry(bodyLength, 0.55, 1.9), bodyMat);
  bodyLow.position.set(0, 0.55, 0);
  group.add(bodyLow);

  // Cabin — Maybach gets taller, roomier cabin
  const cabinW = car.suffix === 'S680' ? 2.8 : 2.2;
  const cabinH = car.suffix === 'S680' ? 0.78 : 0.65;
  const cabinGeo = new THREE.BoxGeometry(cabinW, cabinH, 1.75);
  const cabin = new THREE.Mesh(cabinGeo, bodyMat);
  cabin.position.set(car.suffix === 'S680' ? -0.3 : -0.1, car.suffix === 'S680' ? 1.22 : 1.15, 0);
  group.add(cabin);

  // Windshield
  const windGeo = new THREE.PlaneGeometry(1.1, 0.6);
  const wind = new THREE.Mesh(windGeo, glassMat);
  wind.position.set(1.0, 1.2, 0);
  wind.rotation.y = Math.PI/2;
  wind.rotation.z = -0.35;
  group.add(wind);

  // Rear glass
  const rearGlass = new THREE.Mesh(new THREE.PlaneGeometry(1.0, 0.55), glassMat);
  rearGlass.position.set(-1.1, 1.2, 0);
  rearGlass.rotation.y = Math.PI/2;
  rearGlass.rotation.z = 0.3;
  group.add(rearGlass);

  // Hood slope
  const hoodGeo = new THREE.BoxGeometry(1.5, 0.15, 1.8);
  const hood = new THREE.Mesh(hoodGeo, bodyMat);
  hood.position.set(1.5, 0.9, 0);
  hood.rotation.z = 0.12;
  group.add(hood);

  // Front lip / splitter
  const splitter = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.08, 1.95), accentMat);
  splitter.position.set(2.05, 0.3, 0);
  group.add(splitter);

  // Rear diffuser
  const diffuser = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.12, 1.7), accentMat);
  diffuser.position.set(-2.05, 0.38, 0);
  group.add(diffuser);

  // Side skirts
  [-0.97, 0.97].forEach(z => {
    const skirt = new THREE.Mesh(new THREE.BoxGeometry(3.5, 0.12, 0.08), accentMat);
    skirt.position.set(0, 0.35, z);
    group.add(skirt);
  });

  // Headlights
  [0.6, -0.6].forEach(z => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.18, 0.4), lightMat);
    hl.position.set(2.02, 0.72, z);
    group.add(hl);
  });

  // Taillights
  [0.6,-0.6].forEach(z => {
    const tl = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.15, 0.5),
      new THREE.MeshStandardMaterial({ color:0xff1122, emissive:0xff0000, emissiveIntensity:0.5 }));
    tl.position.set(-2.02, 0.72, z);
    group.add(tl);
  });

  // Wheels
  const wheelPositions = [
    [1.3, 0, 1.02], [1.3, 0, -1.02],
    [-1.3, 0, 1.02], [-1.3, 0, -1.02]
  ];
  wheelPositions.forEach(([x,y,z]) => {
    const tire = new THREE.Mesh(new THREE.CylinderGeometry(0.38, 0.38, 0.26, 32), tireMat);
    tire.rotation.x = Math.PI/2;
    tire.position.set(x, 0.38, z);
    group.add(tire);

    const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.28, 16), rimMat);
    rim.rotation.x = Math.PI/2;
    rim.position.set(x, 0.38, z);
    group.add(rim);

    // Rim spokes
    for (let i=0; i<5; i++) {
      const ang = (i/5)*Math.PI*2;
      const spoke = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.29, 0.18), rimMat);
      spoke.rotation.x = Math.PI/2;
      spoke.rotation.z = ang;
      spoke.position.set(x + Math.cos(ang)*0.13, 0.38, z + Math.sin(ang)*0.13);
      group.add(spoke);
    }

    // Brake caliper
    const caliper = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.18, 0.28), accentMat);
    caliper.position.set(x, 0.38, z > 0 ? z - 0.18 : z + 0.18);
    group.add(caliper);
  });

  // Roof scoop / antenna detail
  const antenna = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.015, 0.35, 8), bodyMat);
  antenna.position.set(-0.8, 1.58, 0.2);
  group.add(antenna);

  group.traverse(c => { if(c.isMesh){ c.castShadow=true; c.receiveShadow=true; } });
  return group;
}

// ─── STATE ───
let currentIndex = 0;
let isTransitioning = false;
let dragUsed = false;

// ─── BUILD SELECTOR ───
const selectorEl = document.getElementById('car-selector');
CARS.forEach((car, i) => {
  const thumb = document.createElement('div');
  thumb.className = 'car-thumb' + (i===0?' active':'');
  thumb.style.setProperty('--t-accent', car.accent);
  thumb.innerHTML = `
    <div class="thumb-rank">NO. ${car.rank}</div>
    <div class="thumb-name">${car.make}<br>${car.model} ${car.suffix}</div>
    <div class="thumb-hp">${car.power} HP</div>
  `;
  thumb.addEventListener('click', () => switchCar(i));
  selectorEl.appendChild(thumb);
});

// ─── RESIZE ───
function resize() {
  const w = wrap.clientWidth, h = wrap.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(wrap);

// ─── PARTICLES ───
const pContainer = document.getElementById('particles');
for (let i=0; i<25; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `
    left:${Math.random()*100}%;
    animation-duration:${4+Math.random()*8}s;
    animation-delay:${-Math.random()*10}s;
    opacity:${0.1+Math.random()*0.3};
    width:${1+Math.random()*2}px;
    height:${1+Math.random()*2}px;
  `;
  pContainer.appendChild(p);
}

// ─── SWITCH CAR ───
async function switchCar(index) {
  if (isTransitioning || index === currentIndex) return;
  isTransitioning = true;

  const overlay = document.getElementById('transition-overlay');
  overlay.classList.add('flash');

  await new Promise(r => setTimeout(r, 180));

  // Remove old model
  if (carGroup) {
    scene.remove(carGroup);
    carGroup = null;
  }

  currentIndex = index;
  const car = CARS[index];

  // Update accent color
  const accentColor = new THREE.Color(car.accent);
  accentSpot.color = accentColor;
  ring.material.color = accentColor;
  ring.material.needsUpdate = true;

  // Update overlay
  document.getElementById('oRank').textContent = car.rank;
  document.getElementById('oMake').textContent = car.make;
  document.getElementById('oModel').innerHTML = `${car.model} <span class="accent" id="oSuffix">${car.suffix}</span>`;
  document.getElementById('oYears').textContent = car.years;
  document.getElementById('sPower').textContent = `${car.power} HP`;
  document.getElementById('sEngine').textContent = car.engine;
  document.getElementById('sValue').textContent = `${car.value} / 10`;
  document.getElementById('oPrice').textContent = car.price;
  document.getElementById('oPrice').style.color = car.accent;
  document.getElementById('oRank').style.color = car.accent;
  document.querySelector('.accent') && (document.querySelector('.accent').style.color = car.accent);
  document.querySelectorAll('.stat-fill').forEach(f => { f.style.background = car.accent; f.style.width='0'; });
  document.getElementById('navCounter').textContent = `0${index+1} / 05`;

  // Update thumbs
  document.querySelectorAll('.car-thumb').forEach((t,i) => t.classList.toggle('active', i===index));

  // Load new model
  carGroup = await loadCarModel(car);
  scene.add(carGroup);

  overlay.classList.remove('flash');
  await new Promise(r => setTimeout(r, 50));

  // Animate stat bars
  setTimeout(() => {
    document.getElementById('fillPower').style.width = `${(car.power/car.powerMax)*100}%`;
    document.getElementById('fillEngine').style.width = `${car.enginePct}%`;
    document.getElementById('fillValue').style.width = `${(car.value/10)*100}%`;
  }, 100);

  isTransitioning = false;
}

// ─── KEYBOARD NAV ───
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') switchCar(Math.min(currentIndex+1, CARS.length-1));
  if (e.key === 'ArrowLeft') switchCar(Math.max(currentIndex-1, 0));
});

// ─── DRAG HINT ───
controls.addEventListener('start', () => {
  if (!dragUsed) {
    dragUsed = true;
    document.getElementById('drag-hint').classList.add('hidden');
  }
});

// ─── RENDER LOOP ───
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.01;

  controls.update();

  // Gentle accent light orbit
  accentSpot.position.x = Math.sin(t * 0.3) * 5;
  accentSpot.position.z = Math.cos(t * 0.3) * 3;

  renderer.render(scene, camera);
}

// ─── INIT ───
async function init() {
  carGroup = await loadCarModel(CARS[0]);
  scene.add(carGroup);

  // Stat bars
  setTimeout(() => {
    document.getElementById('fillPower').style.width = `${(CARS[0].power/CARS[0].powerMax)*100}%`;
    document.getElementById('fillEngine').style.width = `${CARS[0].enginePct}%`;
    document.getElementById('fillValue').style.width = `${(CARS[0].value/10)*100}%`;
  }, 600);

  // Hide loader
  document.getElementById('loader').classList.add('hidden');
  document.getElementById('app').classList.add('visible');

  animate();
}

init();
</script>
